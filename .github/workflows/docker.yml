name: Build and Push Docker Image

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows you to run this manually for testing

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for recent commits
        id: check_commits
        run: |
          if [ -n "$(git log --since='24 hours ago' --oneline)" ]; then
            echo "new_commits=true" >> $GITHUB_OUTPUT
            echo "Changes detected. Proceeding to build..."
          else
            echo "new_commits=false" >> $GITHUB_OUTPUT
            echo "NO changes in the last 24 hours. Skipping."
          fi

      - name: Determine version
        if: steps.check_commits.outputs.new_commits == 'true'
        id: version
        run: |
          # Get the latest version tag (e.g., v1.2.3)
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            # No tags yet — start at v1.0.0
            NEW_VERSION="1.0.0"
          else
            # Strip the 'v' prefix
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            # Auto-bump patch version
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Version: $NEW_VERSION"

      - name: Create git tag
        if: steps.check_commits.outputs.new_commits == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Log in to Docker Hub
        if: steps.check_commits.outputs.new_commits == 'true'
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.check_commits.outputs.new_commits == 'true'
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            kamarkaka4/media-library:latest
            kamarkaka4/media-library:${{ steps.version.outputs.version }}
