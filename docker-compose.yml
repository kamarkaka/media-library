services:
  video-player:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - /path/to/your/videos:/media:ro
    environment:
      - DB_PATH=/data/library.db
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD_HASH=
      - SESSION_SECRET=
    restart: unless-stopped
